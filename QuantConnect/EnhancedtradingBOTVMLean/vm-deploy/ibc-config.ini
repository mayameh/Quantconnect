# ==============================================================================
# IBC Configuration for Headless IB Gateway
# Docs: https://github.com/IbcAlpha/IBC/blob/master/userguide.md
# ==============================================================================

# --- Login Credentials ---
# SECURITY: Use environment variables in production instead of hardcoding.
# IBC checks $IBC_LOGIN_ID and $IBC_PASSWORD first, then falls back to these.
IbLoginId=
IbPassword=

# paper or live
TradingMode=paper

# --- IB Gateway vs TWS ---
# Use "gateway" for headless server operation
IbDir=/opt/ibgateway

# --- Connection ---
# Port IB Gateway listens on (4001=live, 4002=paper)
OverrideTwsApiPort=4002
# Allow LEAN engine to connect from localhost/Docker network
IbAutoClosedown=no

# Accept incoming API connections without manual confirmation
AcceptIncomingConnectionAction=accept

# Existing positions / orders
ExistingSessionDetectedAction=primary
ReadOnlyLogin=no

# Accept non-brokerage account data sharing agreement
AcceptNonBrokerageAccountWarning=yes

# Dismiss any popups / bulletin boards automatically
DismissPasswordExpiryWarning=yes
DismissNSEComplianceNotice=yes

# --- Automatic Restarts ---
# IB Gateway restarts every Sunday at 22:00 UTC by default.
# IBC will handle re-login automatically.

# Time to auto-restart IB Gateway (H:MM format, empty = use IB default)
# Set to match lean.json "ib-weekly-restart-utc-time"
ClosedownAt=

# --- Logging ---
LogToConsole=yes

# --- Two-Factor Authentication ---
# If using 2FA, set up IB Key on mobile and use IBKR Mobile for challenges.
# For fully unattended operation, request a security token exemption from IB.
SecondFactorAuthenticationExitGracePeriod=40
SecondFactorAuthenticationHandler=

# --- Market Data ---
# Keep market data subscriptions active
MinimizeMainWindow=yes
SuppressInfoMessages=yes

# --- SSL ---
# Recommended for security
ForceTwsApiLogin=no
